<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/icons/bada-icon-light.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/icons/bada-icon-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BADA - Find Safe Beaches in Sweden</title>
    <meta
      name="description"
      content="BADA helps beachgoers and families find safe, EU-classified bathing waters in Sweden with real-time quality updates. Browse nearby beaches, check water quality, and save your favorites."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BADA - Find Safe Beaches in Sweden" />
    <meta
      property="og:description"
      content="Discover safe, EU-classified bathing waters in Sweden with real-time water quality updates. Browse beaches on an interactive map and save your favorites."
    />
    <meta property="og:url" content="https://badaweb.netlify.app" />
    <meta property="og:image" content="https://badaweb.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BADA - Find Safe Beaches in Sweden" />
    <meta
      name="twitter:description"
      content="Discover safe, EU-classified bathing waters in Sweden with real-time water quality updates."
    />
    <meta name="twitter:image" content="https://badaweb.netlify.app/og-image.png" />

    <!-- Theme color -->
    <meta
      name="theme-color"
      content="#0a5a82"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a1a24"
      media="(prefers-color-scheme: dark)"
    />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
