# API proxy (topology A) with JWS signing. `signed` references the
# PROXY_SIGNING_KEY env var; Netlify adds an `x-nf-sign` header (HS256 JWT,
# iss "netlify") to each proxied request, which the backend verifies to confirm
# the request genuinely came through Netlify before trusting forwarded headers.
#
# netlify.toml redirects take precedence over public/_redirects, so this signed
# rule wins over the (temporary) fallback /api/* line still in _redirects.
[[redirects]]
  from = "/api/*"
  to = "https://bada-backend.vercel.app/api/:splat"
  status = 200
  force = true
  signed = "PROXY_SIGNING_KEY"

# TEMP marker: proves whether Netlify is reading THIS netlify.toml (i.e. whether
# it sits at the configured base directory). Remove with the diagnostic.
[[headers]]
  for = "/*"
  [headers.values]
    X-Bada-Toml = "frontend"

# TEMP diagnosis (throwaway paths, don't touch live /api): isolate whether
# netlify.toml redirects proxy at all, and whether `signed` specifically works.
[[redirects]]
  from = "/proxytest-plain/*"
  to = "https://bada-backend.vercel.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/proxytest-signed/*"
  to = "https://bada-backend.vercel.app/api/:splat"
  status = 200
  force = true
  signed = "PROXY_SIGNING_KEY"
